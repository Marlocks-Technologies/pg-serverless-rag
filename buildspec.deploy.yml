version: 0.2

phases:
  pre_build:
    commands:
      - echo "Deploy stage deploying to sandbox account"
      - echo "Environment $BR_ENV"
      - echo "Installing Terraform"
      - curl -o terraform.zip https://releases.hashicorp.com/terraform/1.6.0/terraform_1.6.0_linux_amd64.zip
      - unzip -o terraform.zip
      - mv terraform /usr/local/bin/
      - terraform --version
  build:
    commands:
      - echo "Deploying with Terraform remote state + provider assume-role"
      - echo "Build identity (backend account)"
      - aws sts get-caller-identity
      - echo "Initializing Terraform for $BR_ENV environment"
      - cd infra/terraform/environments/$BR_ENV
      - terraform init -backend-config="bucket=$STATE_BUCKET" -backend-config="key=rag-platform/$BR_ENV/terraform.tfstate" -backend-config="region=eu-west-1" -backend-config="dynamodb_table=$LOCK_TABLE"
      - echo "Validating Terraform configuration"
      - terraform validate
      - echo "Planning Terraform changes"
      - terraform plan -out=tfplan -var="aws_account_id=544238486852" -var="aws_region=eu-west-1"
      - echo "Applying Terraform changes"
      - terraform apply -auto-approve tfplan
      - echo "Capturing Terraform outputs"
      - terraform output -json > outputs.json
      - cat outputs.json
  post_build:
    commands:
      - echo "Deployment complete!"
      - echo "Environment $BR_ENV"
      - |
        if [ -f infra/terraform/environments/$BR_ENV/outputs.json ]; then
          echo "Infrastructure outputs"
          cat infra/terraform/environments/$BR_ENV/outputs.json
        fi

artifacts:
  files:
    - infra/terraform/environments/$BR_ENV/outputs.json
  name: DeployOutput

cache:
  paths:
    - '/root/.terraform.d/plugins/**/*'
