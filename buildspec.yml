version: 0.2

phases:
  pre_build:
    commands:
      - echo "Installing Terraform..."
      - curl -o terraform.zip https://releases.hashicorp.com/terraform/1.6.0/terraform_1.6.0_linux_amd64.zip
      - unzip -o terraform.zip
      - mv terraform /usr/local/bin/
      - terraform --version

      - echo "Configuring AWS credentials for cross-account deployment..."
      - export AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - echo "Current account: $AWS_ACCOUNT_ID"

  build:
    commands:
      - echo "Packaging Lambda layers and functions..."
      - cd services/shared && ./package_layer.sh && cd ../..
      - cd services/document_processor && ./package.sh && cd ../..
      - cd services/chat_handler && ./package.sh && cd ../..

      - echo "Uploading Lambda layer to S3..."
      - aws s3 cp services/shared/shared-layer.zip s3://$ARTIFACTS_BUCKET/lambda-layers/rag-platform-$ENVIRONMENT-shared-layer.zip

      - echo "Publishing Lambda layer version..."
      - LAYER_VERSION=$(aws lambda publish-layer-version \
          --layer-name rag-platform-$ENVIRONMENT-shared \
          --content S3Bucket=$ARTIFACTS_BUCKET,S3Key=lambda-layers/rag-platform-$ENVIRONMENT-shared-layer.zip \
          --compatible-runtimes python3.12 \
          --query Version --output text)
      - echo "Published layer version: $LAYER_VERSION"

      - echo "Assuming deployment role in sandbox account..."
      - ASSUME_ROLE_OUTPUT=$(aws sts assume-role \
          --role-arn arn:aws:iam::$SANDBOX_ACCOUNT_ID:role/$DEPLOY_ROLE_NAME \
          --role-session-name codebuild-deploy-session-$CODEBUILD_BUILD_NUMBER)

      - export AWS_ACCESS_KEY_ID=$(echo $ASSUME_ROLE_OUTPUT | jq -r '.Credentials.AccessKeyId')
      - export AWS_SECRET_ACCESS_KEY=$(echo $ASSUME_ROLE_OUTPUT | jq -r '.Credentials.SecretAccessKey')
      - export AWS_SESSION_TOKEN=$(echo $ASSUME_ROLE_OUTPUT | jq -r '.Credentials.SessionToken')

      - echo "Initializing Terraform..."
      - cd infra/terraform/environments/$ENVIRONMENT
      - terraform init \
          -backend-config="bucket=$STATE_BUCKET" \
          -backend-config="key=rag-platform/$ENVIRONMENT/terraform.tfstate" \
          -backend-config="region=$AWS_REGION" \
          -backend-config="dynamodb_table=$STATE_LOCK_TABLE"

      - echo "Planning Terraform changes..."
      - terraform plan -out=tfplan

      - echo "Applying Terraform changes..."
      - terraform apply -auto-approve tfplan

      - echo "Capturing Terraform outputs..."
      - terraform output -json > outputs.json
      - cat outputs.json

  post_build:
    commands:
      - echo "Deployment complete!"
      - echo "Environment: $ENVIRONMENT"
      - |
        if [ -f infra/terraform/environments/$ENVIRONMENT/outputs.json ]; then
          echo "Infrastructure outputs:"
          cat infra/terraform/environments/$ENVIRONMENT/outputs.json
        fi

artifacts:
  files:
    - infra/terraform/environments/$ENVIRONMENT/outputs.json
  name: rag-platform-outputs

cache:
  paths:
    - '/root/.terraform.d/plugins/**/*'
