version: 0.2

phases:
  pre_build:
    commands:
      - echo "Build stage - Packaging Lambda functions and layers"
      - echo "Environment: $BR_ENV"

  build:
    commands:
      - echo "Packaging shared Lambda layer..."
      - cd services/shared && chmod +x package_layer.sh && ./package_layer.sh && cd ../..

      - echo "Packaging document processor Lambda..."
      - cd services/document_processor && chmod +x package.sh && ./package.sh && cd ../..

      - echo "Packaging chat handler Lambda..."
      - cd services/chat_handler && chmod +x package.sh && ./package.sh && cd ../..

      - echo "Verifying package artifacts..."
      - ls -lh services/shared/shared-layer.zip
      - ls -lh services/document_processor/function.zip
      - ls -lh services/chat_handler/function.zip

  post_build:
    commands:
      - echo "Build complete - artifacts ready for deployment"

artifacts:
  files:
    - '**/*'
  name: BuildOutput
